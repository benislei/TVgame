plugins {
    id "com.android.application"
}

android {
    namespace "com.tvgame.receiver"
    compileSdk 35

    defaultConfig {
        applicationId "com.tvgame.receiver"
        minSdk 30
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
        manifestPlaceholders = [
            inputRelayHost: project.findProperty("inputRelayHost") ?: ""
        ]
    }
}
