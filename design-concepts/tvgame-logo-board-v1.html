<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVGame 产品 LOGO 概念</title>
  <style>
    :root {
      --bg: #06100d;
      --panel: #10241e;
      --field: #07110f;
      --line: rgba(139, 184, 164, .2);
      --text: #f7fbf5;
      --muted: #a9c2b6;
      --brand: #20d47d;
      --brand-soft: #7cf7be;
      --amber: #e8bd65;
      --shadow: 0 34px 88px rgba(0, 0, 0, .54);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 15%, rgba(32, 212, 125, .25), transparent 26%),
        radial-gradient(circle at 84% 82%, rgba(232, 189, 101, .15), transparent 27%),
        linear-gradient(135deg, #10271f 0%, #07110f 52%, #050807 100%);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    h1, h2, h3, p { margin: 0; }

    .board {
      width: 1320px;
      height: 840px;
      padding: 36px;
      border-radius: 46px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .035), transparent 42%),
        rgba(5, 12, 10, .88);
      border: 1px solid rgba(255, 255, 255, .08);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(91, 239, 163, .08);
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 24px;
    }

    .eyebrow {
      color: var(--brand-soft);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 38px;
      line-height: 1.05;
      font-weight: 900;
    }

    .header p {
      max-width: 560px;
      color: var(--muted);
      margin-top: 9px;
      font-size: 14px;
      line-height: 1.5;
    }

    .tag {
      padding: 12px 18px;
      border-radius: 999px;
      color: var(--brand-soft);
      background: rgba(32, 212, 125, .12);
      border: 1px solid rgba(32, 212, 125, .32);
      font-size: 14px;
      font-weight: 800;
    }

    .content {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 32px;
      height: 590px;
    }

    .hero-mark,
    .card {
      border-radius: 34px;
      background: rgba(16, 36, 30, .82);
      border: 1px solid var(--line);
    }

    .hero-mark {
      display: grid;
      place-items: center;
      padding: 26px;
    }

    .mark-shell {
      width: 252px;
      height: 252px;
      display: grid;
      place-items: center;
      border-radius: 74px;
      background:
        radial-gradient(circle at 50% 42%, rgba(124, 247, 190, .2), transparent 45%),
        #07110f;
      border: 1px solid rgba(124, 247, 190, .3);
      box-shadow: 0 42px 82px rgba(32, 212, 125, .18);
    }

    .mark-shell img {
      width: 186px;
      height: 186px;
    }

    .hero-caption {
      text-align: center;
      margin-top: 20px;
    }

    .hero-caption h2 {
      font-size: 25px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .hero-caption p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: 1fr 1fr;
      gap: 18px;
    }

    .card {
      padding: 20px;
      overflow: hidden;
    }

    .card h3 {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .lockup {
      display: flex;
      align-items: center;
      gap: 18px;
      height: 104px;
      padding: 16px;
      border-radius: 26px;
      background: rgba(7, 17, 15, .7);
      border: 1px solid rgba(139, 184, 164, .16);
    }

    .lockup img {
      width: 62px;
      height: 62px;
      border-radius: 22px;
    }

    .lockup strong {
      display: block;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .lockup span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
    }

    .usage-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-size {
      display: grid;
      place-items: center;
      background: rgba(7, 17, 15, .7);
      border: 1px solid rgba(139, 184, 164, .16);
    }

    .icon-size img { width: 62%; height: 62%; }
    .s96 { width: 86px; height: 86px; border-radius: 24px; }
    .s64 { width: 58px; height: 58px; border-radius: 17px; }
    .s40 { width: 38px; height: 38px; border-radius: 12px; }

    .mono {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .mono-tile {
      height: 96px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      border: 1px solid rgba(139, 184, 164, .16);
    }

    .mono-tile img {
      width: 60px;
      height: 60px;
      filter: grayscale(1) brightness(2.2);
    }

    .mono-tile:nth-child(1) { background: #07110f; }
    .mono-tile:nth-child(2) { background: #f5fbf7; }
    .mono-tile:nth-child(2) img { filter: grayscale(1) brightness(.16); }
    .mono-tile:nth-child(3) { background: #20d47d; }
    .mono-tile:nth-child(3) img { filter: grayscale(1) brightness(.14); }

    .palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .swatch {
      height: 96px;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.1);
      font-size: 11px;
      font-weight: 800;
    }

    .swatch:nth-child(1) { background: #06100d; }
    .swatch:nth-child(2) { background: #10241e; }
    .swatch:nth-child(3) { background: #20d47d; color: #04110c; }
    .swatch:nth-child(4) { background: #e8bd65; color: #17110a; }
  </style>
</head>
<body>
  <main class="board" aria-label="TVGame 产品 LOGO 概念图">
    <header class="header">
      <div>
        <div class="eyebrow">产品 LOGO 概念</div>
        <h1>TVGame 品牌标志</h1>
        <p>标志由电视屏幕、播放三角和手柄握持弧线组合而成，表达“电脑游戏低延迟投到电视，并保留输入回传”的核心能力。</p>
      </div>
      <div class="tag">独立品牌资产图</div>
    </header>

    <section class="content">
      <article class="hero-mark">
        <div>
          <div class="mark-shell">
            <img src="tvgame-logo-v1.svg" alt="TVGame 主标志">
          </div>
          <div class="hero-caption">
            <h2>屏幕 · 串流 · 手柄</h2>
            <p>简单、可缩放，适合 APK 图标、桌面图标和电视启动页。</p>
          </div>
        </div>
      </article>

      <section class="grid">
        <article class="card">
          <h3>横向组合</h3>
          <div class="lockup">
            <img src="tvgame-logo-v1.svg" alt="TVGame 标志">
            <div>
              <strong>TVGame</strong>
              <span>局域网游戏串流</span>
            </div>
          </div>
        </article>

        <article class="card">
          <h3>小尺寸识别</h3>
          <div class="usage-row">
            <div class="icon-size s96"><img src="tvgame-logo-v1.svg" alt=""></div>
            <div class="icon-size s64"><img src="tvgame-logo-v1.svg" alt=""></div>
            <div class="icon-size s40"><img src="tvgame-logo-v1.svg" alt=""></div>
          </div>
        </article>

        <article class="card">
          <h3>单色适配</h3>
          <div class="mono">
            <div class="mono-tile"><img src="tvgame-logo-v1.svg" alt=""></div>
            <div class="mono-tile"><img src="tvgame-logo-v1.svg" alt=""></div>
            <div class="mono-tile"><img src="tvgame-logo-v1.svg" alt=""></div>
          </div>
        </article>

        <article class="card">
          <h3>品牌色</h3>
          <div class="palette">
            <div class="swatch">#06100D</div>
            <div class="swatch">#10241E</div>
            <div class="swatch">#20D47D</div>
            <div class="swatch">#E8BD65</div>
          </div>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
