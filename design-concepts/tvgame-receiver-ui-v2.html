<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVGame 电视接收端 UI 概念</title>
  <style>
    :root {
      --bg: #06100d;
      --panel: #10241e;
      --panel-2: #132c25;
      --field: #07110f;
      --line: rgba(139, 184, 164, .2);
      --line-strong: rgba(91, 239, 163, .34);
      --text: #f7fbf5;
      --muted: #a9c2b6;
      --dim: #789487;
      --brand: #20d47d;
      --brand-soft: #7cf7be;
      --amber: #e8bd65;
      --shadow: 0 34px 88px rgba(0, 0, 0, .54);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 12%, rgba(32, 212, 125, .24), transparent 25%),
        radial-gradient(circle at 91% 82%, rgba(232, 189, 101, .12), transparent 27%),
        linear-gradient(135deg, #10271f 0%, #07110f 52%, #050807 100%);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    h1, h2, h3, p { margin: 0; }

    .tv {
      width: 1320px;
      height: 742px;
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      background:
        radial-gradient(circle at 50% 46%, rgba(32, 212, 125, .18), transparent 23%),
        radial-gradient(circle at 68% 62%, rgba(232, 189, 101, .1), transparent 24%),
        linear-gradient(135deg, rgba(18, 43, 36, .9), #07110f 56%, #050807);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(91, 239, 163, .08);
    }

    .tv::before {
      content: "";
      position: absolute;
      inset: 80px 120px;
      opacity: .28;
      background-image:
        linear-gradient(rgba(124, 247, 190, .18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 247, 190, .18) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 48%, black, transparent 68%);
    }

    .topbar,
    .bottom,
    .status-strip {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .topbar {
      padding: 32px 42px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      box-shadow: 0 20px 42px rgba(32, 212, 125, .18);
    }

    .brand h1 {
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
    }

    .brand p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 12px;
    }

    .chips {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chip {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 15px;
      border-radius: 999px;
      color: #d8f6e7;
      background: rgba(7, 17, 15, .62);
      border: 1px solid rgba(139, 184, 164, .16);
      font-size: 13px;
      font-weight: 800;
    }

    .chip.live {
      color: var(--brand-soft);
      background: rgba(32, 212, 125, .12);
      border-color: rgba(32, 212, 125, .32);
    }

    .chip.live::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 18px rgba(32, 212, 125, .82);
    }

    .hero {
      position: relative;
      z-index: 1;
      height: 348px;
      display: grid;
      place-items: center;
      text-align: center;
      padding-top: 18px;
    }

    .mark {
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border-radius: 28px;
      background: rgba(32, 212, 125, .13);
      border: 1px solid rgba(124, 247, 190, .28);
      box-shadow: 0 28px 64px rgba(32, 212, 125, .16);
    }

    .mark img {
      width: 62px;
      height: 62px;
    }

    .hero h2 {
      font-size: 38px;
      line-height: 1.1;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .hero p {
      max-width: 650px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.62;
      margin: 0 auto;
    }

    .status-strip {
      width: 820px;
      margin: -6px auto 0;
      padding: 12px;
      border-radius: 24px;
      background: rgba(7, 17, 15, .76);
      border: 1px solid rgba(139, 184, 164, .16);
      backdrop-filter: blur(10px);
    }

    .tile {
      min-width: 0;
      flex: 1;
      padding: 10px 14px;
      border-radius: 17px;
      background: rgba(255,255,255,.035);
    }

    .tile span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .tile strong {
      display: block;
      font-size: 17px;
      line-height: 1.1;
      font-weight: 900;
      white-space: nowrap;
    }

    .tile.ip {
      flex: 1.7;
    }

    .tile.ip strong {
      font-size: 26px;
      letter-spacing: .01em;
    }

    .bottom {
      padding: 20px 42px 0;
      align-items: flex-end;
    }

    .focus-card {
      width: 352px;
      min-height: 90px;
      padding: 15px;
      border-radius: 24px;
      background: rgba(16, 36, 30, .86);
      border: 1px solid rgba(139, 184, 164, .18);
    }

    .focus-card.active {
      border-color: rgba(32, 212, 125, .48);
      box-shadow: 0 24px 46px rgba(32, 212, 125, .14);
    }

    .focus-card span {
      display: block;
      color: var(--brand-soft);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .focus-card h3 {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .focus-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .stream-preview {
      width: 386px;
      min-height: 90px;
      padding: 14px;
      border-radius: 24px;
      background: rgba(3, 9, 8, .72);
      border: 1px solid rgba(139, 184, 164, .16);
    }

    .stream-preview h3 {
      font-size: 15px;
      margin-bottom: 9px;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .metric {
      padding: 8px 9px;
      border-radius: 15px;
      background: rgba(255,255,255,.05);
      text-align: left;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 4px;
    }

    .metric strong {
      font-size: 14px;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="tv" aria-label="TVGame 电视接收端 UI 概念图">
    <header class="topbar">
      <div class="brand">
        <img src="tvgame-logo-v1.svg" alt="TVGame">
        <div>
          <h1>TVGame 接收端</h1>
          <p>局域网游戏串流</p>
        </div>
      </div>
      <div class="chips">
        <div class="chip live">监听中</div>
        <div class="chip">Android 11+</div>
        <div class="chip">按比例显示</div>
      </div>
    </header>

    <section class="hero">
      <div>
        <div class="mark">
          <img src="tvgame-logo-v1.svg" alt="">
        </div>
        <h2>等待电脑发送画面</h2>
        <p>在发送端输入这台电视的 IP。连接成功后自动进入全屏，默认隐藏复杂日志，只在需要时显示诊断浮层。</p>
      </div>
    </section>

    <section class="status-strip" aria-label="连接信息">
      <div class="tile ip">
        <span>本机 IP</span>
        <strong>192.168.50.140</strong>
      </div>
      <div class="tile">
        <span>视频端口</span>
        <strong>5004</strong>
      </div>
      <div class="tile">
        <span>音频端口</span>
        <strong>5006</strong>
      </div>
      <div class="tile">
        <span>输入端口</span>
        <strong>8788</strong>
      </div>
    </section>

    <section class="bottom" aria-label="接收端操作提示">
      <div class="focus-card active">
        <span>推荐操作</span>
        <h3>发送端手动输入 IP</h3>
        <p>手动输入更稳定，自动搜索只作为辅助入口。</p>
      </div>
      <div class="focus-card">
        <span>输入回传</span>
        <h3>手柄与键鼠</h3>
        <p>识别到输入设备后回传到电脑端输入桥。</p>
      </div>
      <div class="stream-preview">
        <h3>串流浮层预览</h3>
        <div class="metric-row">
          <div class="metric"><span>FPS</span><strong>60</strong></div>
          <div class="metric"><span>延迟</span><strong>低</strong></div>
          <div class="metric"><span>丢包</span><strong>0</strong></div>
          <div class="metric"><span>声音</span><strong>正常</strong></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
